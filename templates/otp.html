<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification | Notes Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .otp-container {
            background: #ffffff;
            border-radius: 15px;
            padding: 35px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        
        .otp-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .otp-subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 15px;
        }
        
        .flash {
            text-align: center;
            color: #721c24;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 8px;
            font-weight: 500;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .otp-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            color: #333;
            font-size: 20px;
            font-weight: 500;
            text-align: center;
            letter-spacing: 4px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }
        
        .otp-input::placeholder {
            color: #999;
        }
        
        .otp-input:focus {
            outline: none;
            border-color: #3498db;
            background: white;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
            transform: translateY(-2px);
        }
        
        .verify-btn {
            width: 100%;
            padding: 18px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .verify-btn:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }
        
        .resend-link {
            margin-top: 25px;
            font-size: 15px;
        }
        
        .resend-link a {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
        }
        
        .resend-link a:hover {
            text-decoration: underline;
            color: #2980b9;
        }
        
        @media (max-width: 480px) {
            .otp-container {
                padding: 30px 25px;
                margin: 0 10px;
            }
        }
    </style>
</head>
<body>
    <div class="otp-container">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <h3 class="otp-title">OTP Verification</h3>
        <p class="otp-subtitle">Enter the OTP sent to your email</p>
        
        <form method="POST" action="">
            <div class="form-group">
                <label class="form-label">Enter OTP</label>
                <input type="text" name="userotp" class="otp-input" placeholder="Enter 6-digit OTP" maxlength="6" required autocomplete="off">
            </div>
            <button type="submit" class="verify-btn">Verify OTP</button>
        </form>
        
        <div class="resend-link">
            Didn't receive OTP? <a href="{{ url_for('register') }}">Resend OTP</a>
        </div>
    </div>
</body>
</html>
