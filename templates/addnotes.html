<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Notes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 700px; /* Reduced from 800px */
            margin: 0 auto;
            background: white;
            border-radius: 15px; /* Slightly smaller radius */
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); /* Reduced shadow */
            padding: 30px; /* Reduced from 40px */
            position: relative;
            overflow: hidden;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px; /* Slightly smaller */
            background: linear-gradient(90deg, #1e3c72, #2a5298);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px; /* Reduced */
            font-size: 2.2em; /* Slightly smaller */
            font-weight: 300;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px; /* Reduced from 40px */
            font-size: 1.1em;
        }
        
        /* Flash Messages */
        .alert {
            padding: 12px 18px; /* Reduced padding */
            margin-bottom: 20px; /* Reduced */
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            animation: slideDown 0.3s ease-out;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Form Styling */
        .form-group {
            margin-bottom: 20px; /* Reduced */
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        input[type="text"], textarea {
            width: 100%;
            padding: 15px 18px; /* Reduced padding */
            border: 2px solid #e1e5e9;
            border-radius: 10px; /* Slightly smaller */
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }
        
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #3498db;
            background: white;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
            transform: translateY(-2px);
        }
        
        textarea {
            resize: vertical;
            min-height: 140px; /* Slightly reduced */
        }
        
        /* Save Button */
        .btn {
            width: 100%;
            padding: 16px; /* Reduced */
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn:hover {
            background-color: #2980b9;
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(52, 152, 219, 0.4);
        }
        
        .btn:active {
            transform: translateY(-1px);
        }
        
        /* Back Link */
        .link {
            text-align: center;
            margin-top: 25px; /* Reduced */
        }
        
        .link a {
            display: inline-block;
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            padding: 10px 22px; /* Reduced padding */
            border: 2px solid #3498db;
            border-radius: 25px;
            transition: all 0.3s ease;
        }
        
        .link a:hover {
            background: #3498db;
            color: white;
            transform: translateY(-2px);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .container {
                margin: 10px;
                padding: 25px 20px; /* Further reduced */
            }
            
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Flash messages -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ 'success' if 'success' in message.lower() or 'added' in message.lower() else 'danger' }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <h1>Add Note</h1>
        <p class="subtitle">Write your note below</p>
        
        <!-- Add Note Form -->
        <form method="POST" action="">
            <div class="form-group">
                <label for="title">Note Title</label>
                <input type="text" id="title" name="title" placeholder="Enter your note title..." required>
            </div>
            
            <div class="form-group">
                <label for="content">Note Content</label>
                <textarea id="content" name="content" placeholder="Write your note here..." rows="6" required></textarea>
            </div>
            
            <button type="submit" class="btn">Save Note</button>
        </form>
        
        <div class="link">
            <a href="{{ url_for('dashboard') }}">← Back to Dashboard</a>
        </div>
    </div>

    <script>
        // Auto-hide success messages after 3 seconds
        setTimeout(function() {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => {
                if (alert.textContent.toLowerCase().includes('success') || 
                    alert.textContent.toLowerCase().includes('added')) {
                    alert.style.transition = 'opacity 0.5s';
                    alert.style.opacity = '0';
                    setTimeout(() => alert.remove(), 500);
                }
            });
        }, 3000);
    </script>
</body>
</html>
