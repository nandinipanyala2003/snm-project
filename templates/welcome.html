<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome | Notes Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* New Background - Dark Blue */
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        }

        /* Card */
        .card {
            width: 500px;
            height: 200px;
            background: #ffffff;
            padding: 30px;
            text-align: center;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            margin-bottom: 40px;
            color: #333;
            font-size: 28px;
        }

        /* Buttons Container */
        .buttons-container {
            display: flex;
            gap: 15px;
            justify-content: space-between;
        }

        .btn {
            flex: 1;
            padding: 15px 20px;
            text-decoration: none;
            color: #ffffff;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 500;
            transition: 0.3s ease;
            text-align: center;
        }

        .btn-primary {
            background-color: #3498db;
        }

        .btn-success {
            background-color: #2ecc71;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* Responsive */
        @media (max-width: 450px) {
            .card {
                width: 90%;
                padding: 25px;
            }
            
            .buttons-container {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Welcome to Notes Manager</h2>

        <div class="buttons-container">
            <a href="{{ url_for('login') }}" class="btn btn-primary">Login</a>
            <a href="{{ url_for('register') }}" class="btn btn-success">Register</a>
        </div>
    </div>
</body>
</html>
